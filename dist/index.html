<div id="app">
  <header>
    <h1>NBA Pulse</h1>
    <p id="connection-status">Initializing...</p>
  </header>

  <section class="toolbar">
    <button id="refresh-btn" type="button">Refresh</button>
    <button id="next-game-btn" type="button">Next Game</button>
    <button id="toggle-sort-btn" type="button">Sort Order</button>
  </section>

  <section class="summary-card">
    <div id="selected-game">Loading...</div>
    <div id="selected-meta"></div>
  </section>

  <section class="timeline-card">
    <div id="timeline">Loading the live scoreboard...</div>
  </section>

  <section class="footer-card">
    <div id="page-status"></div>
    <div id="error-status"></div>
  </section>
</div>
