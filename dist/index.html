<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Pulse for Even Hub</title>
    <meta name="description" content="Live NBA event timeline for Even G2 smart glasses." />
    <script type="module" crossorigin src="/app.js"></script>
    <link rel="stylesheet" crossorigin href="/app.css">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>NBA Pulse</h1>
        <p id="connection-status">Initializing…</p>
      </header>

      <section class="toolbar">
        <button id="next-game-btn" type="button">Next Game</button>
      </section>

      <!-- Exit confirmation dialog for preview; hidden by default -->
      <dialog
        id="exit-dialog"
        aria-labelledby="exit-dialog-title"
        aria-describedby="exit-dialog-copy"
      >
        <div class="dialog-form">
          <h2 id="exit-dialog-title">Exit NBA Pulse?</h2>
          <p id="exit-dialog-copy">
            Double-click opened exit confirmation. Choose Cancel to stay
            or Exit app to leave.
          </p>
          <div class="dialog-actions">
            <button id="exit-cancel-btn" type="button" autofocus>Cancel</button>
            <button id="exit-confirm-btn" type="button">Exit app</button>
          </div>
        </div>
      </dialog>

      <section class="summary-card">
        <div id="selected-game">Loading Scoreboard…</div>
        <div id="selected-meta"></div>
      </section>

      <section class="timeline-card">
        <pre id="timeline"></pre>
      </section>

      <section class="footer-card">
        <div id="page-status"></div>
        <div id="error-status"></div>
      </section>
    </div>

  </body>
</html>
